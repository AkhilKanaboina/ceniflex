<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cenifex - Movie Details</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .movie-hero {
            display: flex;
            gap: 2rem;
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }
        .hero-poster {
            width: 200px;
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .hero-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .hero-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .hero-meta {
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }
        .hero-desc {
            color: var(--text-main);
            line-height: 1.6;
        }
        
        /* Theaters Section */
        .theaters-section {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .theater-row {
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .theater-row:last-child {
            border-bottom: none;
        }
        .theater-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .theater-address {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
        .showtimes-list {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .showtime-btn {
            background: #fff;
            border: 1px solid var(--success-color);
            color: var(--success-color);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .showtime-btn:hover {
            background: var(--success-color);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h2 id="welcomeMessage">
                <a href="/index.html" style="text-decoration: none; color: inherit;">&larr; Back to Movies</a>
            </h2>
            <button id="logoutBtn" class="btn btn-secondary">Logout</button>
        </header>

        <main class="dashboard-content">
            <!-- Loading -->
            <div id="loadingIndicator" style="text-align: center; padding: 2rem; color: #64748b;">
                Loading movie details...
            </div>
            
            <div id="errorState" class="alert error hidden">
                Failed to load data. Please try again.
            </div>

            <div id="contentArea" class="hidden">
                <!-- Movie Hero -->
                <div class="movie-hero">
                    <img id="moviePoster" class="hero-poster" src="" alt="Movie Poster">
                    <div class="hero-info">
                        <h1 id="movieTitle" class="hero-title">Movie Title</h1>
                        <div id="movieMeta" class="hero-meta">Genre • Language • Duration</div>
                        <p id="movieDesc" class="hero-desc">Movie description goes here.</p>
                    </div>
                </div>

                <!-- Theaters -->
                <div class="theaters-section">
                    <h3 style="margin-bottom: 1.5rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem;">Available Theaters & Showtimes for Today</h3>
                    
                    <div id="theatersList">
                        <!-- Theater rows injected via JS -->
                    </div>
                </div>
            </div>
            
        </main>
    </div>

    <script src="/js/movie-details.js"></script>
</body>
</html>
