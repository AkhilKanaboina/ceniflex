<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cenifex - Sign Up</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="center-content">
    <div class="glass-card auth-card">
        <div class="card-header">
            <h2>Create an Account</h2>
            <p>Join us today! It only takes a minute</p>
        </div>

        <div id="alertBox" class="alert hidden"></div>

        <form id="signupForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required minlength="6">
            </div>

            <button type="submit" class="btn btn-primary" id="signupSubmitBtn">
                <span class="btn-text">Sign Up</span>
                <span class="loader hidden"></span>
            </button>
        </form>

        <div class="card-footer">
            <p>Already have an account? <a href="/login.html" class="link">Log in</a></p>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
